# ITSM Workflow Intelligence Tool — Autonomous Regulatory Content Monitor
# -------------------------------------------------------------------------
# Runs every Monday at 08:00 UTC. Checks authoritative regulatory sources
# for new publications. If changes are detected, automatically updates
# itsm-content-v25.json with a notice pointing users to the source.
#
# No human intervention required. No API keys needed.
# Notices are informational — they point users to verify at source.
# The tool fetches this file on load and surfaces any active notices.
#
# Sources monitored:
#   - FCA Handbook updates  (fca.org.uk)
#   - EBA/DORA publications (eba.europa.eu)
#   - ICO news              (ico.org.uk)
#   - AXELOS/ITIL releases  (axelos.com)

name: Regulatory Content Monitor

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  check-regulatory-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check regulatory sources and update content
        run: |
          node - <<'EOF'
          // FIX: wrapped in async IIFE — top-level await is not valid in CommonJS (node -)
          const fs = require('fs');
          const https = require('https');

          function httpGet(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'itsm-tool-monitor/1.0' } }, (res) => {
                // Follow redirects (301/302)
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  return httpGet(res.headers.location).then(resolve).catch(reject);
                }
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          const sources = [
            {
              id: 'fca_handbook',
              name: 'FCA Handbook',
              url: 'https://www.handbook.fca.org.uk/updates/rss.xml',
              keywords: ['SUP 15', 'operational resilience', 'operational incident', 'notification'],
              authority: 'https://www.handbook.fca.org.uk/handbook/SUP/15/',
              authorityName: 'FCA Handbook SUP 15'
            },
            {
              id: 'eba_dora',
              name: 'EBA publications',
              // EBA Atom/RSS feed for regulatory news
              url: 'https://www.eba.europa.eu/feed/news',
              keywords: ['DORA', 'Digital Operational Resilience', 'ICT', 'incident reporting', 'RTS'],
              authority: 'https://eur-lex.europa.eu/eli/reg/2022/2554/oj',
              authorityName: 'EU DORA (Digital Operational Resilience Act) — EUR-Lex'
            },
            {
              id: 'ico_news',
              name: 'ICO',
              url: 'https://ico.org.uk/about-the-ico/news-and-events/news-and-blogs/rss/',
              keywords: ['breach', 'GDPR', 'notification', 'data protection', 'reporting'],
              authority: 'https://ico.org.uk/for-organisations/report-a-breach/',
              authorityName: 'ICO breach reporting guidance'
            }
          ];

          (async () => {
            const contentPath = './itsm-content-v25.json';
            let content = {};
            try {
              content = JSON.parse(fs.readFileSync(contentPath, 'utf8'));
            } catch(e) {
              console.error('Could not read content file:', e.message);
              process.exit(1);
            }

            const today = new Date().toISOString().slice(0, 10);
            let foundNotices = [];
            let checkErrors = [];

            console.log(`Checking ${sources.length} regulatory sources...`);

            for (const source of sources) {
              try {
                console.log(`  Checking: ${source.name} (${source.url})`);
                const body = await httpGet(source.url);

                const twoWeeksAgo = new Date();
                twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);

                const itemMatches = body.match(/<(item|entry)[\s\S]*?<\/(item|entry)>/gi) || [];
                let relevant = [];

                for (const item of itemMatches) {
                  const dateMatch = item.match(/<(pubDate|updated|published)>(.*?)<\/(pubDate|updated|published)>/i);
                  if (dateMatch) {
                    const pubDate = new Date(dateMatch[2]);
                    if (!isNaN(pubDate) && pubDate < twoWeeksAgo) continue;
                  }
                  const titleMatch = item.match(/<title[^>]*>(.*?)<\/title>/i);
                  const descMatch = item.match(/<(description|summary|content)[^>]*>([\s\S]*?)<\/(description|summary|content)>/i);
                  const text = ((titleMatch && titleMatch[1]) + ' ' + (descMatch && descMatch[2])).toLowerCase();

                  if (source.keywords.some(kw => text.includes(kw.toLowerCase()))) {
                    const link = (item.match(/<link>(.*?)<\/link>/i) || item.match(/<link[^>]+href="([^"]+)"/i) || [])[1] || source.authority;
                    relevant.push({
                      title: titleMatch ? titleMatch[1].replace(/<!\[CDATA\[|\]\]>|<[^>]+>/g, '').trim() : 'New publication',
                      link: typeof link === 'string' ? link.trim() : source.authority
                    });
                  }
                }

                if (relevant.length > 0) {
                  console.log(`  -> ${relevant.length} relevant publication(s) found at ${source.name}`);
                  foundNotices.push({
                    id: `${source.id}_${today.replace(/-/g,'')}`,
                    type: 'info',
                    title: `${source.name} — new publication detected`,
                    text: `${relevant[0].title}. Verify any changes relevant to your incident management process at the source below.`,
                    authority: source.authority,
                    authorityName: source.authorityName,
                    detected: today,
                    applies_to: [source.id],
                    expires: (() => {
                      const d = new Date();
                      d.setDate(d.getDate() + 90);
                      return d.toISOString().slice(0, 10);
                    })()
                  });
                } else {
                  console.log(`  -> No relevant publications in last 14 days`);
                }
              } catch(e) {
                // Non-fatal: log the error but continue checking other sources
                console.log(`  -> Could not reach ${source.name}: ${e.message}`);
                checkErrors.push(source.name);
              }
            }

            // Update content file
            content.meta = content.meta || {};
            content.meta.last_checked_at = today;
            content.meta.last_check_errors = checkErrors.length > 0 ? checkErrors : undefined;

            const existing = content.content_warnings || [];
            let updated = [...existing];

            for (const notice of foundNotices) {
              const sourcePrefix = notice.id.split('_').slice(0, -1).join('_');
              updated = updated.filter(w => !w.id || !w.id.startsWith(sourcePrefix));
              updated.push(notice);
            }
            content.content_warnings = updated;

            if (foundNotices.length === 0) {
              content.meta.last_check_result = checkErrors.length > 0 ? 'partial_error' : 'clear';
              console.log(`Check complete. Clear: ${checkErrors.length === 0}. Errors: ${checkErrors.join(', ') || 'none'}`);
            }

            fs.writeFileSync(contentPath, JSON.stringify(content, null, 2) + '\n');
            console.log(`Content file updated. Notices found: ${foundNotices.length}, Source errors: ${checkErrors.length}`);

          })().catch(e => {
            console.error('Monitor failed:', e.message);
            process.exit(1);
          });
          EOF

      - name: Commit updated content
        run: |
          git config user.name "ITSM Content Monitor"
          git config user.email "actions@github.com"
          git add itsm-content-v25.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regulatory content monitor — $(date +%Y-%m-%d)

          Automated weekly check of FCA, EBA/DORA and ICO publications.
          Any new notices added to itsm-content-v25.json for display in the tool.
          Notices point users to verify at source — no guidance text modified.

          [skip ci]"
            git push
            echo "Content updated and pushed"
          fi