# ITSM Workflow Intelligence Tool — Autonomous Regulatory Content Monitor
# -------------------------------------------------------------------------
# Runs every Monday at 08:00 UTC. Checks authoritative regulatory sources
# for new publications. If changes are detected, automatically updates
# itsm-content-v25.json with a notice pointing users to the source.
#
# No human intervention required. No API keys needed.
# Notices are informational — they point users to verify at source.
# The tool fetches this file on load and surfaces any active notices.
#
# Sources monitored:
#   - FCA Handbook updates  (fca.org.uk)
#   - EBA/DORA publications (eba.europa.eu)
#   - ICO news              (ico.org.uk)
#   - AXELOS/ITIL releases  (axelos.com)

name: Regulatory Content Monitor

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab — no other action needed

jobs:
  check-regulatory-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check regulatory sources and update content
        id: check
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const https = require('https');

          // Helper: fetch a URL and return body as string
          function fetch(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'itsm-tool-monitor/1.0' } }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          // Sources to monitor — checking for recent publications
          const sources = [
            {
              id: 'fca_handbook',
              name: 'FCA Handbook',
              url: 'https://www.handbook.fca.org.uk/updates/rss.xml',
              keywords: ['SUP 15', 'operational resilience', 'operational incident', 'notification'],
              authority: 'https://www.handbook.fca.org.uk/handbook/SUP/15/',
              authorityName: 'FCA Handbook SUP 15'
            },
            {
              id: 'eba_dora',
              name: 'EBA — DORA',
              url: 'https://www.eba.europa.eu/rss/news',
              keywords: ['DORA', 'Digital Operational Resilience', 'ICT', 'incident reporting', 'RTS'],
              authority: 'https://www.eba.europa.eu/regulation-and-policy/dora',
              authorityName: 'EBA DORA publications'
            },
            {
              id: 'ico_news',
              name: 'ICO',
              url: 'https://ico.org.uk/about-the-ico/news-and-events/news-and-blogs/rss/',
              keywords: ['breach', 'GDPR', 'notification', 'data protection', 'reporting'],
              authority: 'https://ico.org.uk/for-organisations/report-a-breach/',
              authorityName: 'ICO breach reporting guidance'
            }
          ];

          // Load existing content file
          const contentPath = './itsm-content-v25.json';
          let content = {};
          try {
            content = JSON.parse(fs.readFileSync(contentPath, 'utf8'));
          } catch(e) {
            console.error('Could not read content file:', e.message);
            process.exit(1);
          }

          const today = new Date().toISOString().slice(0, 10);
          const lastChecked = content.meta && content.meta.last_checked_at;
          let foundNotices = [];
          let checkErrors = [];

          console.log(`Checking ${sources.length} regulatory sources...`);

          // Check each source
          for (const source of sources) {
            try {
              console.log(`  Checking: ${source.name} (${source.url})`);
              const body = await fetch(source.url);

              // Simple keyword check in RSS content published in the last 14 days
              const twoWeeksAgo = new Date();
              twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);

              // Extract items from RSS
              const itemMatches = body.match(/<item[\s\S]*?<\/item>/gi) || [];
              let relevant = [];

              for (const item of itemMatches) {
                // Check pubDate
                const dateMatch = item.match(/<pubDate>(.*?)<\/pubDate>/i);
                if (dateMatch) {
                  const pubDate = new Date(dateMatch[1]);
                  if (pubDate < twoWeeksAgo) continue; // too old
                }
                // Check keywords
                const titleMatch = item.match(/<title[^>]*>(.*?)<\/title>/i);
                const descMatch = item.match(/<description[^>]*>([\s\S]*?)<\/description>/i);
                const text = ((titleMatch && titleMatch[1]) + ' ' + (descMatch && descMatch[1])).toLowerCase();

                if (source.keywords.some(kw => text.includes(kw.toLowerCase()))) {
                  const link = (item.match(/<link>(.*?)<\/link>/i) || [])[1] || source.authority;
                  relevant.push({
                    title: titleMatch ? titleMatch[1].replace(/<[^>]+>/g, '').trim() : 'New publication',
                    link: link.trim()
                  });
                }
              }

              if (relevant.length > 0) {
                console.log(`  → ${relevant.length} relevant publication(s) found at ${source.name}`);
                foundNotices.push({
                  id: `${source.id}_${today.replace(/-/g,'')}`,
                  type: 'info',
                  title: `${source.name} — new publication detected`,
                  text: `${relevant[0].title}. Verify any changes relevant to your incident management process.`,
                  authority: source.authority,
                  authorityName: source.authorityName,
                  detected: today,
                  applies_to: [source.id],
                  expires: (() => {
                    const d = new Date();
                    d.setDate(d.getDate() + 90); // notice expires in 90 days
                    return d.toISOString().slice(0, 10);
                  })()
                });
              } else {
                console.log(`  → No relevant publications in last 14 days`);
              }
            } catch(e) {
              console.log(`  → Could not reach ${source.name}: ${e.message}`);
              checkErrors.push(source.name);
            }
          }

          // Update content file
          content.meta = content.meta || {};
          content.meta.last_checked_at = today;

          // Merge new notices (avoid duplicates by source id prefix)
          const existing = content.content_warnings || [];
          const existingIds = new Set(existing.map(w => w.id));

          for (const notice of foundNotices) {
            // Remove older notices for same source
            const sourcePrefix = notice.id.split('_').slice(0, -1).join('_');
            const filtered = existing.filter(w => !w.id.startsWith(sourcePrefix));
            filtered.push(notice);
            content.content_warnings = filtered;
          }

          if (foundNotices.length === 0 && checkErrors.length === 0) {
            // All clear — keep existing warnings but note check date
            content.meta.last_check_result = 'clear';
            console.log('All sources checked — no new relevant publications.');
          }

          fs.writeFileSync(contentPath, JSON.stringify(content, null, 2) + '\n');
          console.log(`Content file updated. Found: ${foundNotices.length} notices, Errors: ${checkErrors.length}`);

          // Signal to next step whether a commit is needed
          const changed = foundNotices.length > 0 || true; // always commit to update last_checked_at
          require('fs').writeFileSync('/tmp/check_result.txt', changed ? 'changed' : 'unchanged');
          EOF

      - name: Commit updated content if changed
        run: |
          git config user.name "ITSM Content Monitor"
          git config user.email "actions@github.com"
          git add itsm-content-v25.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regulatory content monitor — $(date +%Y-%m-%d)

          Automated weekly check of FCA, EBA/DORA and ICO publications.
          Any new notices are added to itsm-content-v25.json for display in the tool.
          No regulatory guidance text was modified — notices point users to verify at source.

          [skip ci]"
            git push
            echo "Content updated and pushed"
          fi
